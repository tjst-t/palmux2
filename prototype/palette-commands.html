<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>S031-2 · Palette — &gt; commands routed to Bash</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" aria-hidden="true" style="filter: blur(0.5px);">
    <header class="header"><span class="headerBrand">PALMUX</span><span class="headerCrumb">tjst-t/<b>palmux2</b> / <b>main</b> / Claude</span></header>
    <aside class="drawer"><div class="statusStrip"><span class="brand">PALMUX</span></div></aside>
    <main class="main"><div class="tabBar"><button class="tab tabActive">◆ Claude</button></div></main>
  </div>

  <div class="paletteOverlay">
    <div class="paletteCard" data-testid="command-palette">
      <div class="paletteInputRow">
        <span class="palettePrefix">&gt;</span>
        <input
          class="paletteInput"
          autofocus
          value="serve"
          data-testid="palette-input"
        >
        <span class="paletteDetail" style="font-family:var(--font-mono);">filter: commands</span>
      </div>
      <div class="paletteHintRow">
        <span><span class="paletteHint">@</span> workspaces</span>
        <span><span class="paletteHint">#</span> tabs</span>
        <span><span class="paletteHint">&gt;</span> commands</span>
        <span><span class="paletteHint">:</span> files</span>
        <span><span class="paletteHint">?</span> grep</span>
        <span style="margin-left:auto;"><span class="paletteHint">⌘↵</span> pick target</span>
      </div>

      <ul class="paletteList">
        <li class="paletteSection">Make targets</li>
        <li>
          <button class="paletteRow paletteRowActive">
            <span class="paletteIcon">▶</span>
            <span class="paletteLabel">make <mark>serve</mark></span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">▶</span>
            <span class="paletteLabel">make <mark>serve</mark>-stop</span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">▶</span>
            <span class="paletteLabel">make <mark>serve</mark>-logs</span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">▶</span>
            <span class="paletteLabel">make dev</span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>

        <li class="paletteSection">npm scripts (frontend/)</li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">⌘</span>
            <span class="paletteLabel">npm run dev</span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">⌘</span>
            <span class="paletteLabel">npm run build</span>
            <span class="paletteDetail">→ bash:dev</span>
          </button>
        </li>

        <li class="paletteSection">User commands</li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">★</span>
            <span class="paletteLabel">deploy preview</span>
            <span class="paletteDetail">user · → bash:dev</span>
          </button>
        </li>

        <li class="paletteSection">Builtins</li>
        <li>
          <button class="paletteRow">
            <span class="paletteIcon">$</span>
            <span class="paletteLabel">new bash</span>
            <span class="paletteDetail">builtin</span>
          </button>
        </li>
      </ul>

      <div class="paletteFootRow">
        <span><span class="kbd">↑</span><span class="kbd">↓</span> navigate</span>
        <span><span class="kbd">↵</span> run on bash:dev</span>
        <span><span class="kbd">⌘↵</span> pick target Bash…</span>
        <span><span class="kbd">Esc</span> close</span>
      </div>
    </div>
  </div>
</body>
</html>
