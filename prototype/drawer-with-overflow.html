<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>S030-2 · Drawer with repo overflow menu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="headerBrand">PALMUX</span>
      <span class="headerCrumb">tjst-t/<b>palmux2</b> / <b>main</b> / Claude</span>
      <span class="headerSpacer"></span>
      <button class="headerBtn">⌘K</button>
      <button class="headerBtn">🔔</button>
    </header>

    <aside class="drawer">
      <div class="statusStrip">
        <span class="brand">PALMUX</span>
        <span class="statusMeta"><span><b>3</b> open</span><span><b>7</b> total</span></span>
      </div>

      <div class="section">
        <span class="sectionTitle">Repositories</span>
        <span class="sectionCount">3</span>
      </div>

      <ul class="repos">
        <li class="repo">
          <div class="repoRow">
            <span class="repoNum">1</span>
            <button class="repoName"><span class="scope">tjst-t/</span>palmux2</button>
            <button class="starBtn" data-on="true">★</button>
            <button class="addBranchBtn">+</button>
            <button class="moreBtn">⋯</button>
          </div>
          <ul class="branches">
            <li>
              <button class="branch branchActive">
                <span><span class="ghqMark">⌂</span>main</span>
                <span class="primaryTag">primary</span>
              </button>
            </li>
            <li>
              <button class="branch">
                <span><span class="ghqMark">⌂</span>feature/sprint-runner</span>
              </button>
            </li>
          </ul>
        </li>

        <li class="repo">
          <div class="repoRow">
            <span class="repoNum">2</span>
            <button class="repoName"><span class="scope">tjst-t/</span>port-manager</button>
            <button class="starBtn">☆</button>
            <button class="addBranchBtn">+</button>
            <button class="moreBtn">⋯</button>
          </div>
          <div class="glanceLine">⌂ main <span class="glanceArrow">›</span></div>
        </li>

        <li class="repo" style="background: rgba(124, 138, 255, 0.04);">
          <div class="repoRow">
            <span class="repoNum">3</span>
            <button class="repoName"><span class="scope">tjst-t/</span>old-prototype</button>
            <button class="starBtn">☆</button>
            <button class="addBranchBtn">+</button>
            <button class="moreBtn" data-testid="repo-more-btn" style="color: var(--color-fg);">⋯</button>
          </div>
          <div class="glanceLine">⌂ main <span class="glanceArrow">›</span></div>

          <div class="overflowMenu" role="menu" data-testid="repo-overflow-menu">
            <button class="overflowItem">
              <span style="color:var(--color-fg-muted);">★</span>
              <span>Pin to top</span>
            </button>
            <button class="overflowItem">
              <span style="color:var(--color-fg-muted);">📋</span>
              <span>Copy ghq path</span>
            </button>
            <button class="overflowItem">
              <span style="color:var(--color-fg-muted);">🌐</span>
              <span>Open on GitHub</span>
            </button>
            <div class="overflowDivider"></div>
            <button class="overflowItem" data-testid="repo-close-item">
              <span>✕</span>
              <span>Close repository</span>
            </button>
            <button class="overflowItem overflowItemDanger" data-testid="repo-delete-item">
              <span>🗑</span>
              <span>Delete repository…</span>
            </button>
          </div>
        </li>
      </ul>

      <div class="drawerFooter">
        <button class="addRepoBtn">
          <span style="color:var(--color-fg-muted);">📂</span>
          <span>Open Repository…</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="tabBar">
        <button class="tab tabActive"><span class="tabIcon">◆</span> Claude</button>
        <button class="tab"><span class="tabIcon">$</span> bash</button>
        <button class="tab"><span class="tabIcon">📁</span> Files</button>
        <button class="tab"><span class="tabIcon">⎇</span> Git</button>
      </div>
      <div class="mainBody" style="opacity:0.5;">
        <p style="color: var(--color-fg-muted); font-size:13px;">
          Repository <b>tjst-t/old-prototype</b> overflow menu open. Click <b>Delete</b> to open the
          delete-preview modal — see <a href="delete-modal-clean.html">delete-modal-clean</a> /
          <a href="delete-modal-warning.html">delete-modal-warning</a>.
        </p>
      </div>
    </main>
  </div>
</body>
</html>
